name: Test Quay Credentials Access
on:
  pull_request:
    paths:
      - '.github/workflows/test-quay-credentials.yml'

jobs:
  test-rhoai-pull:
    runs-on: ubuntu-latest
    env:
      QUAY_ID: ${{ secrets.QUAY_ID }}
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
    steps:
      - name: Login to Quay.io
        run: |
          if [ -z "$QUAY_ID" ] || [ -z "$QUAY_TOKEN" ]; then
            echo "::error::QUAY_ID or QUAY_TOKEN secrets are not set"
            exit 1
          fi
          echo "Logging in to quay.io as $QUAY_ID..."
          podman login quay.io -u "$QUAY_ID" -p "$QUAY_TOKEN"

      - name: Pull rhoai operator image
        run: podman pull quay.io/rhoai/data-science-pipelines-operator:main
