name: KFP SDK Tests

on:
  push:
    branches:
      - master
      - main
      - stable
      - 'rhoai-*'
  pull_request:
    paths:
      - 'api/**'
      - 'sdk/**'
      - 'test_data/sdk_compiled_pipelines/**'
      - './test/presubmit-tests-sdk.sh'
      - '.github/workflows/kfp-sdk-tests.yml'
      - '!**/*.md'
      - '!**/OWNERS'

concurrency:
  group: sdk-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      matrix:
        python-version: ['3.9', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install protobuf dependencies & kfp-pipeline-spec
      id: install-protobuf-deps
      uses: ./.github/actions/protobuf

    - name: Install kfp & kfp-kubernetes from source
      id: install-kfp-k8s-deps
      uses: ./.github/actions/kfp-k8s

    - name: Install Test dependencies
      run: |
        pip install -r sdk/python/requirements-dev.txt
        pip install pytest
        pip install docker
        pip install pytest-cov
        pip install pytest-xdist
        pip install google_cloud_pipeline_components
        pip install requests==2.28.1

    - name: Run SDK Tests
      id: run-tests
      env:
        # We setup the env in the CI
        SETUP_ENV: false
        REPO_NAME: ${{ github.repository }}
        PULL_NUMBER: ${{ github.event.pull_request.number }}
        PYTEST_PARALLEL_WORKERS: 2
        JUNIT_XML: "sdk-unit.xml"
        PIP_INDEX_URL: "https://pypi.org/simple"
        PIP_TRUSTED_HOST: "pypi.org"
      run: |
        ./test/presubmit-tests-sdk.sh
        echo "JUNIT_XML=$JUNIT_XML" >> "$GITHUB_OUTPUT"

    - name: Publish Junit Summary
      id: summary
      uses: ./.github/actions/junit-summary
      if: (!cancelled())
      with:
        xml_files: ${{ steps.run-tests.outputs.JUNIT_XML }}
      continue-on-error: true
